<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Logic Math Challenge</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1 class="title">🧠 Logic Math Challenge</h1>

<div id="startScreen">

<h2>Enter Your Name</h2>
<input type="text" id="playerName" placeholder="Your name">

<button onclick="startGame()">Start Game</button>

</div>

<div id="gameScreen" class="hidden">

<h2 id="question"></h2>

<div class="choices">

<button class="choice" onclick="checkAnswer(0)"></button>
<button class="choice" onclick="checkAnswer(1)"></button>
<button class="choice" onclick="checkAnswer(2)"></button>
<button class="choice" onclick="checkAnswer(3)"></button>

</div>

<p id="score">Score: 0</p>

</div>

<div id="resultScreen" class="hidden">

<h2>Game Finished!</h2>
<p id="finalScore"></p>

<button onclick="restart()">Play Again</button>

</div>

</div>

<audio id="correctSound" src="correct.mp3"></audio>
<audio id="wrongSound" src="wrong.mp3"></audio>

<script src="script.js"></script>

</body>
</html>
